<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Deal Registry</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WD</div>
        <div>
          <div class="brand-title">White Deal Registry</div>
          <div class="brand-subtitle">Единый реестр регистраций сделок</div>
        </div>
      </div>

      <div class="sidebar-block">
        <label class="field-label">Роль доступа</label>
        <select id="roleSelect" class="select"></select>
      </div>

      <div class="sidebar-block">
        <div class="menu-title">Разделы</div>
        <nav id="navMenu" class="nav"></nav>
      </div>

      <div class="sidebar-status">
        <div class="status-title">Статус системы</div>
        <div class="status-text">Демо-прототип без бэка. Действия имитируются, данные синтетические.</div>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <div id="pageEyebrow" class="page-eyebrow">Операционный контур</div>
          <h1 id="pageTitle" class="page-title">Сводка</h1>
        </div>
        <div class="topbar-actions">
          <div class="search-wrap">
            <input id="searchInput" class="search" placeholder="Поиск по номеру, участнику, предмету, типу..." />
          </div>
          <button class="button button-secondary" id="openJournalBtn">Журнал действий</button>
        </div>
      </header>

      <main class="content-grid">
        <section class="main-column">
          <div id="mainContent"></div>
        </section>
        <aside class="detail-column">
          <div id="detailPanel" class="detail-panel"></div>
        </aside>
      </main>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div id="modalEyebrow" class="modal-eyebrow">Процедура</div>
          <div id="modalTitle" class="modal-title">Действие</div>
        </div>
        <button class="icon-button" onclick="closeModal()">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="button button-secondary" onclick="closeModal()">Закрыть</button>
        <button class="button" onclick="closeModal()">Подтвердить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
