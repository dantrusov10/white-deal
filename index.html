<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Deal Registry v3.2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WD</div>
        <div>
          <div class="brand-title">White Deal Registry</div>
          <div class="brand-subtitle">Единый реестр регистраций сделок</div>
        </div>
      </div>
      <div class="side-section">
        <label class="field-label">Роль доступа</label>
        <select id="roleSelect" class="select"></select>
      </div>
      <div class="side-section">
        <div class="menu-title">Разделы</div>
        <nav id="navMenu" class="nav"></nav>
      </div>
      <div class="side-footer">
        <div class="footer-title">Статус системы</div>
        <div class="footer-text">Демо-прототип без бэка. Все данные синтетические, действия имитируются.</div>
      </div>
    </aside>
    <div class="content-shell">
      <header class="topbar">
        <div>
          <div id="pageTitle" class="page-title">Сводка</div>
          <div id="pageSubtitle" class="page-subtitle">Операционная панель участника рынка</div>
        </div>
        <div class="topbar-actions">
          <div class="search-wrap">
            <input id="globalSearch" class="search" placeholder="Поиск по номеру, участнику, предмету, типу..." />
          </div>
          <button class="btn btn-secondary" id="journalBtn">Журнал действий</button>
        </div>
      </header>
      <main class="workspace">
        <section id="mainContent" class="main-content"></section>
      </main>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-window">
      <div class="modal-header">
        <div>
          <div id="modalTitle" class="modal-title">Карточка</div>
          <div id="modalSubtitle" class="modal-subtitle">Подробные сведения</div>
        </div>
        <button id="closeModal" class="icon-btn" aria-label="Закрыть">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCloseBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
