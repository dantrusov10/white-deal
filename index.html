<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>White Deal — Реестр регистраций сделок</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">WD</div>
        <div>
          <div class="brand-title">White Deal</div>
          <div class="brand-sub">Единый реестр регистраций сделок</div>
        </div>
      </div>

      <div class="role-block">
        <div class="section-label">Роль доступа</div>
        <div class="role-switch">
          <button class="role-btn active" data-role="partner">Партнер</button>
          <button class="role-btn" data-role="vendor">Вендор</button>
          <button class="role-btn" data-role="arbitrage">Арбитраж</button>
          <button class="role-btn" data-role="market">Рынок</button>
        </div>
      </div>

      <nav class="nav">
        <div class="section-label">Разделы</div>
        <button class="nav-btn active" data-section="summary">Сводка</button>
        <button class="nav-btn" data-section="registry">Реестр регистраций</button>
        <button class="nav-btn" data-section="disputes">Реестр споров</button>
        <button class="nav-btn" data-section="catalog-vendors">Каталог вендоров</button>
        <button class="nav-btn" data-section="catalog-partners">Каталог партнеров</button>
        <button class="nav-btn" data-section="ratings">Рейтинги</button>
        <button class="nav-btn" data-section="analytics">Аналитика рынка</button>
        <button class="nav-btn" data-section="history">Журнал действий</button>
      </nav>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <h1 id="page-title">Сводка</h1>
          <div class="page-subtitle" id="page-subtitle">Операционная сводка по текущей роли и ключевым действиям</div>
        </div>
        <div class="topbar-actions">
          <input id="global-search" class="search" placeholder="Поиск по номеру, клиенту, участнику" />
          <button class="ghost-btn" id="open-register-flow">Новая регистрация</button>
        </div>
      </header>

      <section id="content"></section>
    </main>

    <aside class="details-panel">
      <div class="details-header">
        <div class="details-title">Карточка объекта</div>
        <button class="link-btn" id="clear-details">Очистить</button>
      </div>
      <div id="details-content" class="details-content muted">
        Выберите запись в реестре, уведомление, участника или аналитический сигнал.
      </div>
    </aside>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title">Процедура</div>
          <div class="modal-subtitle" id="modal-subtitle">Пошаговая форма</div>
        </div>
        <button class="link-btn" id="close-modal">Закрыть</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
