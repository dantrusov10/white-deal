<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Deal — независимый реестр IT-сделок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">⚖</div>
        <div>
          <div class="brand-title">White Deal</div>
          <div class="brand-subtitle">Независимый реестр IT-сделок</div>
        </div>
      </div>

      <div class="side-group">
        <div class="side-label">Режим просмотра</div>
        <div class="role-switch" id="roleSwitch"></div>
      </div>

      <div class="side-group">
        <div class="side-label">Разделы</div>
        <nav id="navMenu" class="nav-menu"></nav>
      </div>

      <div class="side-group side-note">
        <div class="side-note-title">Демо-режим</div>
        <div class="side-note-text">
          Все данные синтетические. Поля редактируются, но ничего не сохраняется. Логика экранов прошита для показа реалистичного флоу.
        </div>
      </div>
    </aside>

    <main class="main-shell">
      <header class="topbar">
        <div>
          <div class="page-kicker">Кликабельный статический прототип</div>
          <h1 id="pageTitle" class="page-title"></h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-btn" id="openQuickHelp">Как устроен прототип</button>
          <button class="primary-btn" id="openWelcome">Обзор покрытия</button>
        </div>
      </header>

      <section class="hero-row" id="heroRow"></section>
      <section class="kpi-grid" id="kpiGrid"></section>
      <section id="contentArea" class="content-area"></section>
    </main>
  </div>

  <div id="modalRoot"></div>

  <script src="app.js"></script>
</body>
</html>
